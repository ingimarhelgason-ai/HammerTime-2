<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#0f0f0f">
  <title>Hammer Time</title>
  <link rel="stylesheet" href="src/css/theme.css">
</head>
<body>
  <div id="app">
    <div id="screen"></div>
  </div>

  <script type="module">
    // ─── SCREEN REGISTRY ─────────────────────────────────────
    const registry = {
      'home':         () => import('./src/screens/home.js'),
      'project-new':  () => import('./src/screens/project-new.js'),
      'project-view': () => import('./src/screens/project-view.js'),
      'log':          () => import('./src/screens/log.js'),
      'settings':     () => import('./src/screens/settings.js'),
    }

    let currentModule = null

    // ─── ROUTER ──────────────────────────────────────────────
    window.navigate = async function(screenName, params = {}) {
      // Tear down current screen
      if (currentModule?.destroy) {
        try { currentModule.destroy() } catch {}
      }
      currentModule = null

      const container = document.getElementById('screen')
      container.innerHTML = ''

      const loader = registry[screenName]
      if (!loader) {
        console.error(`Unknown screen: ${screenName}`)
        return
      }

      try {
        const mod = await loader()
        currentModule = mod
        mod.render(container, params)
      } catch (err) {
        console.error(`Failed to load screen "${screenName}":`, err)
        container.innerHTML = `
          <div style="padding:32px 20px; color:var(--danger); font-size:14px; text-align:center;">
            <div style="margin-bottom:8px; font-weight:600;">Fejl ved indlæsning</div>
            <div style="color:var(--text2); font-family:var(--mono); font-size:12px;">${err.message}</div>
          </div>
        `
      }
    }

    // ─── BOOT ────────────────────────────────────────────────
    window.navigate('home')
  </script>
</body>
</html>
